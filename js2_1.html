<body>
    <h1>Problem 1</h1>
    <div id="answer"></div>
    <script>
        function count(arr, value){
            let c = 0;
            for(let i = 0; i < arr.length; i++){
                if(arr[i] < value){
                    c++;
                }
            }
            return c;
        }

        function testCount(){
            let nums = [3,55,30,28,9,12];
            let value = 10;
            let result = count(nums, value);

            document.getElementById("answer").textContent = count(nums, value);
        }

        testCount();
        
    </script>
