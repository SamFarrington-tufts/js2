<body>
    <h1>Problem 2</h1>
    <div id="answer"></div>
    <script>  
        let string = prompt("Provide a sentence: ");
        let words = string.split(" ");
        let count = words.length;

        document.getElementById("answer").textContent = "The sentence has " + count + " words.";
    </script>
