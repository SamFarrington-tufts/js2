<!DOCTYPE html>
<html>
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style type = "text/css">
        body{font-family: 'Roboto', sans-serif;}
    </style>
    <meta charset="utf-8">
    <title>Problem 5</title>
</head>

<body>
    <h1>Problem 5</h1>
    <div id="answer"></div>
    <script>  
        function speak(){
            //Gets the user input and stores it in a name var for the alert
            let name = document.getElementById("username").value;

            //Gets the value label for the specific button being pressed and stores it in prefix
            let prefix = this.value;
            alert(prefix + " " + name);
        }

        window.onload = function(){
            document.getElementById("btnHello").onclick = speak;
            document.getElementById("btnGoodBye").onclick = speak;
            document.getElementById("btnGreetings").onclick = speak;
        }
    </script>

    <form name="form1">
        <!--Gets user input-->
        <label for="username">Name:</label><input type="text" name='username' id='username'>

        <!--Buttons that call speak with the appropriate prefix-->
        <input type="button" value="Hello" id="btnHello">
        <input type="button" value="Good Bye" id="btnGoodBye">
        <input type="button" value="Greetings" id="btnGreetings">
    </form>

        
</body>
</html>
